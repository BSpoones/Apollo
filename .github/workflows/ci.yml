name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Test summary
        if: always()
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import glob
          import xml.etree.ElementTree as ET
          total = failed = skipped = 0
          for path in glob.glob('build/test-results/test/TEST-*.xml'):
              suite = ET.parse(path).getroot()
              total += int(suite.get('tests', 0))
              failed += int(suite.get('failures', 0)) + int(suite.get('errors', 0))
              skipped += int(suite.get('skipped', 0))
          print(f'## Tests\n\n**{total}** run · **{failed}** failed · **{skipped}** skipped')
          EOF

      - name: Coverage report
        run: ./gradlew koverXmlReport koverHtmlReport

      - name: Coverage summary
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          root = ET.parse('build/reports/kover/report.xml').getroot()
          counters = {c.get('type'): (int(c.get('covered')), int(c.get('missed'))) for c in root.findall('counter')}
          print('## Coverage\n')
          print('| Metric | Covered | Missed | % |')
          print('|---|---|---|---|')
          for metric in ('LINE', 'BRANCH', 'INSTRUCTION', 'METHOD', 'CLASS'):
              if metric in counters:
                  covered, missed = counters[metric]
                  pct = 100 * covered / (covered + missed) if covered + missed else 100.0
                  print(f'| {metric.title()} | {covered} | {missed} | {pct:.2f}% |')
          EOF

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/kover/html/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/libs/*.jar
            build/publications/

# Publishing happens only from release.yml on version tags — republishing a fixed
# version on every main push would 409 against GitHub Packages.
